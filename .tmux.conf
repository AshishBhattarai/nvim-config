bind-key l select-pane -L
bind-key h select-pane -R
bind-key k select-pane -U
bind-key j select-pane -D

set -s escape-time 0

set -g @kde_pins ''

set -g focus-events on
set -g status-style bg=default
set -g status-left-length 0
set -g status-right-length 90
set -g status-justify absolute-centre
set -g status-interval 50
set -g status-right '#{?client_prefix,[PFX] ,}#(whoami)@#H %d-%b-%Y %H:%M '
set -g status-left '[#S]  #{?@kde_pins,#{@kde_pins} ,}'

set -g allow-passthrough on
set -g mouse off
set -g default-terminal "tmux-256color"

run-shell '~/Documents/deps/tmux-resurrect/resurrect.tmux'
run-shell -b '~/.config/nvim/kde_pinned.sh'
